name: CI Testing Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        # The fix that makes this pipeline honest: dependencies and tests live in
        # langchain_service/, not the repo root. The old workflow looked for
        # requirements.txt at the root, found nothing, installed nothing, and
        # "passed" by running a test that imported no application code.
        working-directory: langchain_service
    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # matches the runtime image (python:3.11-slim)
          cache: 'pip'
          cache-dependency-path: langchain_service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        env:
          LLM_MODE: mock
        run: python -m pytest -v

      # ---- eval plumbing tiers (plan 002 Step 9a) ----
      # Mock/deterministic, zero containers. Scores are meaningless by design;
      # what CI verifies is that the eval MACHINERY works and hasn't drifted.

      - name: Retrieval eval (plumbing tier, self-arming gate)
        env:
          LLM_MODE: mock
        # The gate arms itself: before a baseline is committed this runs
        # ungated; the moment eval/baselines/retrieval_plumbing.json lands in
        # the repo, every CI run enforces it at tolerance 0.0.
        run: |
          if [ -f eval/baselines/retrieval_plumbing.json ]; then
            python -m eval.eval_retrieval --tier plumbing --gate
          else
            echo "::notice::no committed baseline yet — running ungated (commit one with --save-baseline to arm the gate)"
            python -m eval.eval_retrieval --tier plumbing
          fi

      - name: Judge eval (plumbing tier)
        env:
          LLM_MODE: mock
        run: python -m eval.eval_judge --tier plumbing   # exits 1 if any verdict fails to parse

  csharp-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4   # (old workflow had a 'setup-detnet' typo)
        with:
          dotnet-version: '11.0.x'

      - name: Build gateway
        run: dotnet build server/server.csproj --configuration Release

      - name: Run xUnit tests
        run: dotnet test server.Tests/server.Tests.csproj --configuration Release
