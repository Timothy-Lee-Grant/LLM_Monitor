services:
  dotnet_server:
    build: 
      context: ./server
      dockerfile: dockerfile
    container_name: dotnet_server
    ports:
      - "5000:80"
    depends_on:
      - langchain_service
      #also we will need to add a database for logging
  
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
  
  ollama-pull-model:
    image: curlimages/curl:latest
    container_name: ollama_pull_model
    depends_on:
      - ollama
    entrypoint: ["sh", "-c", "until curl -s http://ollama:11434/api/tags > /dev/null; do sleep 1; done; echo 'Ollama is up, pulling qwen2.5:1.5b...'; curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:1.5b\"}'; curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}'" ]
  
  langchain_service:
    build: 
      context: ./langchain_service
      dockerfile: dockerfile
    container_name: langchain_service
    ports:
      - "5001:5000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  pgvector-service:
    image: pgvector/pgvector:pg16
    container_name: pgvector_service
    environment: [POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      retries: 10
    

volumes:
  ollama_data:

