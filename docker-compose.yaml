services:
  # Web Server
  web_server:
    container_name: web_app
  
  langchain_service:
    container_name: langchain_service


  # Web application service
  web:
    image: node:20-alpine
    container_name: web_app
    command: npm start
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - DATABASE_URL=postgres://admin:secret_pass@db:5432/mydb
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy

  # Database service
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret_pass
      - POSTGRES_DB=mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5

# Persistent volumes definitions
volumes:
  pgdata:
