services:
  dotnet_server:
    build:
      context: ./server
      dockerfile: dockerfile
    container_name: dotnet_server
    ports:
      - "5000:8080"
    environment:
      - OBSERVABILITY_ENABLED=${OBSERVABILITY_ENABLED:-false}   # consumed from Step 2 on
      # YARP's default upstream (appsettings.json) already points at
      # http://langchain_service:5000/. To retarget without a rebuild, uncomment:
      # - ReverseProxy__Clusters__langchain__Destinations__primary__Address=http://langchain_service:5000/
    depends_on:
      langchain_service:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_service
    profiles: ["live"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  langchain_service:
    build: 
      context: ./langchain_service
      dockerfile: dockerfile
    container_name: langchain_service
    ports:
      # DEV/TEST path only (CONTRACTS.md §6): direct access bypassing the gateway.
      # Deleting this mapping is the production lockdown switch — no code changes.
      - "5001:5000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OBSERVABILITY_ENABLED=${OBSERVABILITY_ENABLED:-false}   # consumed from Step 3 on
      - LLM_MODE=${LLM_MODE:-mock}
      - LLM_MODEL=${LLM_MODEL:-llama3.1:8b}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret_pass}
      - POSTGRES_DB=${POSTGRES_DB:-vectordb}
    depends_on:
      pgvector-service:
        condition: service_healthy
    # python:3.11-slim ships neither curl nor wget, so the probe is stdlib python.
    # start_period covers image boot + one-time RAG ingestion in the entrypoint.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 5s
      retries: 12
      start_period: 20s

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    environment:
      # OpenWebUI now enters through the GATEWAY (acceptance criterion 5):
      # every chat transits telemetry -> YARP -> langchain_service.
      - OPENAI_API_BASE_URL=http://dotnet_server:8080/v1
      - OPENAI_API_KEY=dummy-key-not-checked
      - ENABLE_OLLAMA_API=false
      - WEBUI_AUTH=false
      - RAG_EMBEDDING_ENGINE=ollama
      - HF_HUB_OFFLINE=1
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - dotnet_server

  # ---- observability stack (plan 002) ----------------------------------
  # Opt-in via `./build.sh --obs` (compose profile "obs", same mechanism as
  # "live"). Without the flag, none of these exist — the default system
  # stays exactly as light as before.

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel_collector
    profiles: ["obs"]
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      # exposed to host so locally-run (non-docker) dev processes can export too
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    profiles: ["obs"]
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # trace UI: http://localhost:16686

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: ["obs"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"     # query UI: http://localhost:9090

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: ["obs"]
    environment:
      # local learning setup: no login wall (never do this outside localhost)
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"     # dashboards: http://localhost:3001 (3000 is OpenWebUI)
    depends_on:
      - prometheus

  pgvector-service:
    image: pgvector/pgvector:pg16
    container_name: pgvector_service
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secret_pass}
      - POSTGRES_DB=${POSTGRES_DB:-vectordb}
    volumes: 
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-vectordb}"]
      interval: 5s
      retries: 10
    

volumes:
  ollama_data:
  pgdata:
  openwebui_data:
  prometheus_data:
  grafana_data:
