# Tells Grafana to auto-load any dashboard JSON found in /var/lib/grafana/dashboards
# (mounted from observability/grafana/dashboards/).

apiVersion: 1

providers:
  - name: "LLM_Monitor dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /var/lib/grafana/dashboards
